name: 🎭 Playwright QA Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

env:
  BASE_URL: https://www.ocus.com
  CONTACT_URL: https://help.ocus.com/hc/en-us/requests/new
  NODE_VERSION: 'lts/*'

jobs:
  smoke-tests:
    name: 🔥 Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: 📦 Install dependencies
        run: npm install
      - name: 🌐 Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: 🔥 Run Smoke Tests
        run: npx playwright test tests/smoke/ --project=chromium
        env:
          CI: true
          BASE_URL: ${{ env.BASE_URL }}
      - name: 📤 Upload smoke report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: smoke-report-${{ github.run_number }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  regression-tests:
    name: 🧪 Regression + API Tests
    needs: smoke-tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install
      - run: npx playwright install --with-deps chromium firefox
      - name: 🧪 Run Regression Tests
        run: npx playwright test tests/regression/ --project=chromium --project=firefox
        env:
          CI: true
          BASE_URL: ${{ env.BASE_URL }}
          CONTACT_URL: ${{ env.CONTACT_URL }}
      - name: 🔌 Run API Tests
        run: npx playwright test tests/api/ --project=chromium
        env:
          CI: true
          BASE_URL: ${{ env.BASE_URL }}
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: regression-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 14

  quality-tests:
    name: ♿ Accessibility + Performance + SEO
    needs: smoke-tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - name: ♿ Accessibility Tests
        run: npx playwright test tests/accessibility/ --project=chromium
        env:
          CI: true
          BASE_URL: ${{ env.BASE_URL }}
      - name: 📊 Performance Tests
        run: npx playwright test tests/performance/ --project=chromium
        env:
          CI: true
          BASE_URL: ${{ env.BASE_URL }}
      - name: 🔍 SEO Tests
        run: npx playwright test tests/seo/ --project=chromium
        env:
          CI: true
          BASE_URL: ${{ env.BASE_URL }}
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: quality-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 14

  visual-responsive-tests:
    name: 📸 Visual + Responsive Tests
    needs: smoke-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install
      - run: npx playwright install --with-deps chromium webkit
      - name: 📸 Visual Regression Tests (update baselines in CI)
        run: npx playwright test tests/visual/ --project=chromium --project=webkit --update-snapshots
        env:
          CI: true
          BASE_URL: ${{ env.BASE_URL }}
        continue-on-error: true
      - name: 📱 Responsive Tests
        run: npx playwright test tests/responsive/
        env:
          CI: true
          BASE_URL: ${{ env.BASE_URL }}
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: visual-responsive-report-${{ github.run_number }}
          path: |
            playwright-report/
            screenshots/
            tests/visual/**/*.png
          retention-days: 30

  pipeline-summary:
    name: 📋 Pipeline Summary
    needs: [smoke-tests, regression-tests, quality-tests, visual-responsive-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: 📋 Post summary
        run: |
          echo "## 🎭 Playwright QA Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔥 Smoke Tests | ${{ needs.smoke-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Regression + API | ${{ needs.regression-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ♿ Quality | ${{ needs.quality-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📸 Visual + Responsive | ${{ needs.visual-responsive-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** push on main" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
